<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hexagon Minesweeper</title>
    <style>
        html, body, canvas {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            position: absolute; background: black; z-index: 0;
        }
    </style>
</head>
<body>
    <!-- tabindex="1" prevents the .focus() error -->
    <canvas id="glcanvas" tabindex="1"></canvas>
    
    <!-- Load the official Macroquad / Miniquad loader script -->
    <!-- <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script> -->
    <script src="static/mq_js_bundle.js"></script>
    <script>
        // Intercept and kill the right-click menu globally across the whole page
        window.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        }, false);
    </script>

    <script>
    (function() {
        const testing_canvas = document.createElement('canvas');
        const testing_gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!testing_gl) {
            alert('WebGL is not supported or is disabled in your browser. Please install/enable it to see my amazing game.');
        }
    })();
    </script>

    <script>
        // Points directly to the file we will build next
        load("static/main.wasm");
    </script>
</body>
</html>
